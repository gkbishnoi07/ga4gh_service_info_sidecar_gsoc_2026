# GA4GH ServiceInfo Sidecar Configuration
# This file provides both operational settings and metadata overrides.
# Field names follow the GA4GH ServiceInfo v1 specification:
# https://github.com/ga4gh-discovery/ga4gh-service-info

# --- Sidecar operational settings ---
# These control sidecar behavior. Override with SIDECAR_* env vars.

upstream_url: "http://localhost:8081"
service_type: "drs"
service_info_path: "/ga4gh/drs/v1/service-info"
upstream_merge: true

# --- Required ServiceInfo fields (from GA4GH spec) ---
# These are served directly when upstream_merge is false,
# or used as operator overrides when upstream_merge is true.

id: "org.ga4gh.serviceinfo-sidecar"

name: "GA4GH ServiceInfo Sidecar"

type:
  group: "org.ga4gh"
  artifact: "drs"
  version: "1.3.0"

organization:
  name: "GA4GH"
  url: "https://www.ga4gh.org"

version: "0.1.0"

# --- Optional fields ---

description: "A reusable sidecar service for standardizing GA4GH ServiceInfo metadata."
environment: "dev"

# contactUrl:    "https://..."        # optional — contact form or mailto:
# documentationUrl: "https://..."    # optional — docs URL
# createdAt:     "2026-06-01T00:00:00Z"   # optional — ISO 8601
# updatedAt:     "2026-06-11T00:00:00Z"   # optional — ISO 8601
